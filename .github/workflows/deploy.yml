name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Pull latest to EC2
    runs-on: ubuntu-latest
    # Skip this job entirely if EC2 secrets haven't been configured yet
    if: ${{ vars.EC2_ENABLED == 'true' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /var/www/resume-win
            git pull origin main
            echo "Deployed at $(date)"
